<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle with sage green -->
  <circle cx="50" cy="50" r="48" fill="#8B9D8A"/>
  
  <!-- Stylized tree/leaf representing nature-based therapy -->
  <g fill="#F8F6F3">
    <!-- Tree trunk -->
    <rect x="47" y="55" width="6" height="20" rx="1"/>
    
    <!-- Leaves/branches forming a calm, balanced symbol -->
    <circle cx="50" cy="45" r="12"/>
    <circle cx="38" cy="50" r="8"/>
    <circle cx="62" cy="50" r="8"/>
    <circle cx="42" cy="38" r="6"/>
    <circle cx="58" cy="38" r="6"/>
  </g>
  
  <!-- Initials KV in the center -->
  <text x="50" y="48" font-family="serif" font-size="20" font-weight="600" fill="#8B9D8A" text-anchor="middle" dominant-baseline="middle">KV</text>
</svg>

